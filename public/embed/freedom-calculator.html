<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Freedom Number Calculator — InvisibleExit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:1.5rem;font-size:0.9rem}
h2{color:#a78bfa;font-size:1.1rem;margin-bottom:1rem}
label{display:block;color:#94a3b8;font-size:0.8rem;margin-bottom:0.3rem;margin-top:0.8rem}
input{width:100%;padding:0.5rem;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.9rem}
input:focus{outline:2px solid #8b5cf6;border-color:transparent}
.result{margin-top:1.2rem;padding:1rem;background:#1e293b;border-radius:8px;text-align:center}
.result .num{font-size:1.8rem;font-weight:700;color:#8b5cf6}
.result .label{font-size:0.75rem;color:#64748b;margin-top:0.3rem}
button{width:100%;padding:0.6rem;margin-top:1rem;background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:opacity 0.2s}
button:hover{opacity:0.9}
</style>
</head>
<body>
<h2>Freedom Number Calculator</h2>
<label>Monthly Expenses ($)</label>
<input type="number" id="expenses" value="4000" min="0">
<label>Safe Withdrawal Rate (%)</label>
<input type="number" id="rate" value="4" min="0" max="20" step="0.1">
<div class="result" id="result">
  <div class="num" id="freedomNumber">$1,200,000</div>
  <div class="label">Your Freedom Number</div>
</div>
<button onclick="calculate()">Calculate</button>
<script>
function calculate(){
  const e=parseFloat(document.getElementById('expenses').value)||0;
  const r=(parseFloat(document.getElementById('rate').value)||4)/100;
  const n=r>0?(e*12/r).toFixed(0):0;
  document.getElementById('freedomNumber').textContent='$'+Number(n).toLocaleString();
}
calculate();
</script>
</body>
</html>
