name: SEO/GEO Automation

on:
  schedule:
    - cron: '0 12 * * *' # Daily at 12:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Audit mode'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine audit mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date +%u)" = "1" ]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run SEO/GEO Audit (GLM-5.2)
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          AUDIT_MODE: ${{ steps.mode.outputs.mode }}
        run: python3 scripts/seo-agent.py

      - name: Create PR if changes exist
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff HEAD~1 --quiet 2>/dev/null; then
            echo "No changes to PR."
          else
            BRANCH="seo-audit/$(date +%Y-%m-%d)"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            gh pr create \
              --title "SEO/GEO Audit — $(date +%Y-%m-%d) (${{ steps.mode.outputs.mode }})" \
              --body "Automated SEO/GEO audit run powered by GLM-5.2." \
              --label "seo-audit" \
              --base main \
              --head "$BRANCH" || echo "PR creation skipped"
          fi
